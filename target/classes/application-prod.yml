# ============================================================
# Configuración de PRODUCCIÓN — ms-usuarios
# Activar con: -Dspring.profiles.active=prod
# Variables de entorno OBLIGATORIAS en producción:
#   DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET, SERVER_PORT
# ============================================================

spring:
  datasource:
    url:      ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.driver.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: America/Bogota

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret:    ${JWT_SECRET}
  expiracion: ${JWT_EXPIRACION:86400000}

# Swagger deshabilitado en producción
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    usuarios: INFO
    org.springframework.jdbc: WARN
    org.springframework.security: WARN
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
